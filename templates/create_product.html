{% extends "layout.html" %}

{% block title %}Create Product - Farmer-Hub{% endblock %}

{% block content %}
<div class="container">
    <div class="dashboard-header">
        <h1 style="color: white;">List a Product</h1>
        <p style="color: white;">Sell seeds or animals to other farmers</p>
    </div>

    <div class="card">
        <div class="card-body">
            <form method="POST" action="{{ url_for('create_product') }}" enctype="multipart/form-data">
                
                <!-- Product Image Upload -->
                <div class="form-group">
                    <label class="form-label" style="color: #1A1A1A;">Product Image</label>
                    <div class="product-image-upload" id="productImageUpload">
                        <div class="image-preview" id="imagePreview">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                                <circle cx="8.5" cy="8.5" r="1.5"/>
                                <polyline points="21 15 16 10 5 21"/>
                            </svg>
                            <span>Click to upload product image</span>
                        </div>
                        <input type="file" id="product_image" name="product_image" accept="image/*" onchange="previewProductImage(this)" required>
                    </div>
                    <small style="color: #4A4A4A;">Required - Upload a clear photo of your product</small>
                </div>

                <div class="form-group">
                    <label class="form-label" for="title" style="color: #1A1A1A;">Product Title</label>
                    <input type="text" class="form-input" id="title" name="title" required placeholder="e.g., Organic Tomato Seeds">
                </div>

                <div class="grid grid-2">
                    <div class="form-group">
                        <label class="form-label" for="category" style="color: #1A1A1A;">Category</label>
                        <select class="form-select" id="category" name="category" required>
                            <option value="">Select Category</option>
                            <option value="seeds">Seeds</option>
                            <option value="animals">Animals</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="subcategory" style="color: #1A1A1A;">Subcategory</label>
                        <select class="form-select" id="subcategory" name="subcategory">
                            <option value="">Select Subcategory</option>
                            <option value="vegetables">Vegetables</option>
                            <option value="fruits">Fruits</option>
                            <option value="grains">Grains</option>
                            <option value="flowers">Flowers</option>
                            <option value="livestock">Livestock</option>
                            <option value="poultry">Poultry</option>
                            <option value="aquaculture">Aquaculture</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="description" style="color: #1A1A1A;">Description</label>
                    <textarea class="form-textarea" id="description" name="description" required placeholder="Describe your product in detail..."></textarea>
                </div>

                <div class="grid grid-3">
                    <div class="form-group">
                        <label class="form-label" for="price" style="color: #1A1A1A;">Price</label>
                        <input type="number" class="form-input" id="price" name="price" step="0.01" required placeholder="0.00">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="quantity" style="color: #1A1A1A;">Quantity</label>
                        <input type="number" class="form-input" id="quantity" name="quantity" required value="1" min="1">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="unit" style="color: #1A1A1A;">Unit</label>
                        <select class="form-select" id="unit" name="unit" required>
                            <option value="kg">Kilogram (kg)</option>
                            <option value="piece">Piece</option>
                            <option value="liter">Liter</option>
                            <option value="pack">Pack</option>
                        </select>
                    </div>
                </div>

                <div class="d-flex gap-2 mt-3">
                    <button type="submit" class="btn btn-primary">List Product</button>
                    <a href="{{ url_for('marketplace') }}" class="btn btn-outline">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    .product-image-upload {
        position: relative;
        border: 2px dashed #ddd;
        border-radius: var(--radius);
        padding: 2rem;
        text-align: center;
        cursor: pointer;
        transition: var(--transition);
        background: var(--bg-light);
    }
    
    .product-image-upload:hover {
        border-color: var(--primary);
        background: rgba(45, 90, 39, 0.05);
    }
    
    .product-image-upload input[type="file"] {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        opacity: 0;
        cursor: pointer;
    }
    
    .image-preview {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.5rem;
        color: var(--text-light);
    }
    
    .image-preview img {
        max-width: 100%;
        max-height: 200px;
        border-radius: var(--radius);
        display: none;
    }
    
    .image-preview svg {
        color: var(--primary);
    }
    
    .image-preview.has-image svg,
    .image-preview.has-image span {
        display: none;
    }
    
    .image-preview.has-image img {
        display: block;
    }
</style>

<script>
    function previewProductImage(input) {
        const preview = document.getElementById('imagePreview');
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                preview.classList.add('has-image');
                preview.innerHTML = '<img src="' + e.target.result + '" alt="Product Image">';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>
{% endblock %}
